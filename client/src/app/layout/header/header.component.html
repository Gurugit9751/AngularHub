<mat-toolbar class="main-header">
  <a class="brand" [routerLink]="isAdmin() ? '/dashboard' : '/home'">
    <span class="brand-logo"> A </span>

    <span class="brand-name"> AngularHub </span>
  </a>

  @if (!isAdmin()) {
    <nav class="documentation-header-menu" aria-label="Main documentation navigation">
      @for (item of userHeaderMenu; track item.route) {
        <a
          mat-button
          class="header-menu-link"
          [routerLink]="item.route"
          routerLinkActive="active-header-menu"
          [routerLinkActiveOptions]="{
            exact: item.exact ?? false,
          }"
        >
          {{ item.label }}
        </a>
      }
    </nav>
  } @else {
    <div class="admin-header-title">Administration</div>
  }

  <span class="header-spacer"></span>

  <button
    mat-icon-button
    type="button"
    [matMenuTriggerFor]="accountMenu"
    aria-label="Open account menu"
  >
    <mat-icon>account_circle</mat-icon>
  </button>

  <mat-menu #accountMenu="matMenu">
    <button mat-menu-item routerLink="/profile">
      <mat-icon>person</mat-icon>
      <span>Profile</span>
    </button>

    <button mat-menu-item type="button" (click)="logout()">
      <mat-icon>logout</mat-icon>
      <span>Logout</span>
    </button>
  </mat-menu>
</mat-toolbar>
