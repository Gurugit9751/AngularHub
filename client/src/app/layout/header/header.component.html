<header class="application-header">
  <mat-toolbar class="header-toolbar">
    <a
      class="brand"
      [routerLink]="isAdmin() ? '/dashboard' : '/home'"
      aria-label="TechMaster Academy home"
    >
      <span class="brand-mark">A</span>
      <span class="brand-name">TechMaster Academy</span>
    </a>

    @if (!isAdmin()) {
      <nav class="documentation-navigation" aria-label="Documentation navigation">
        @for (item of userHeaderMenu; track item.route) {
          <a
            mat-button
            class="navigation-link"
            [routerLink]="item.route"
            routerLinkActive="active-navigation-link"
            [routerLinkActiveOptions]="{
              exact: item.exact ?? false,
            }"
          >
            {{ item.label }}
          </a>
        }
      </nav>
    }

    <span class="header-spacer"></span>

    <div class="header-actions">
      <button
        mat-icon-button
        type="button"
        class="notification-button"
        matTooltip="Notifications"
        aria-label="Notifications"
      >
        <mat-icon>notifications_none</mat-icon>
        <span class="notification-indicator"></span>
      </button>

      <button
        type="button"
        class="account-button"
        [matMenuTriggerFor]="accountMenu"
        aria-label="Open account menu"
      >
        <span class="account-avatar">
          {{ initials() }}
        </span>

        <span class="account-information">
          <strong>{{ displayName() }}</strong>

          <small>
            {{ isAdmin() ? 'Administrator' : 'User' }}
          </small>
        </span>

        <mat-icon class="account-chevron"> expand_more </mat-icon>
      </button>
    </div>

    <mat-menu #accountMenu="matMenu" xPosition="before" panelClass="account-menu-panel">
      <div class="account-menu-header" (click)="$event.stopPropagation()">
        <span class="menu-avatar">
          {{ initials() }}
        </span>

        <div class="menu-user-details">
          <strong>{{ fullName() }}</strong>

          <span>
            {{ isAdmin() ? 'Administrator' : 'User' }}
          </span>
        </div>
      </div>

      <div class="account-menu-divider"></div>

      <button mat-menu-item routerLink="/profile" class="account-menu-item">
        <mat-icon>person_outline</mat-icon>
        <span>My Profile</span>
      </button>

      @if (isAdmin()) {
        <button mat-menu-item routerLink="/settings" class="account-menu-item">
          <mat-icon>settings</mat-icon>
          <span>Settings</span>
        </button>
      }

      <div class="account-menu-divider"></div>

      <button
        mat-menu-item
        type="button"
        class="account-menu-item logout-menu-item"
        (click)="logout()"
      >
        <mat-icon>logout</mat-icon>
        <span>Logout</span>
      </button>
    </mat-menu>
  </mat-toolbar>
</header>
