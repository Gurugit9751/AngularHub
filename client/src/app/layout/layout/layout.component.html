<div class="application-shell">
  <app-header />

  <div class="layout-body" [class.with-sidebar]="showSidebar()">
    @if (showSidebar()) {
      <aside class="layout-sidebar" [class.admin-layout-sidebar]="isAdmin()">
        <app-sidebar />
      </aside>
    }

    <main class="layout-main-content">
      <router-outlet />
    </main>
  </div>
</div>
